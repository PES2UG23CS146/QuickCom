<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Product Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 460px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 24px; color: #1a202c; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        input, textarea, select { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        textarea { height: 80px; resize: vertical; }
        .field-error { color: #c53030; font-size: 0.8rem; margin-top: 4px; }
        button { width: 100%; padding: 12px; background: #4299e1; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #3182ce; }
        .back { display: block; text-align: center; margin-top: 14px; color: #4299e1; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="card">
    <h2 th:text="${product.id} ? 'Edit Product' : 'Add Product'">Product Form</h2>
    <form method="post" th:action="${product.id} ? @{/admin/products/edit/{id}(id=${product.id})} : @{/admin/products/add}" th:object="${product}">
        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" />
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" th:field="*{price}" step="0.01" min="0" />
            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" th:field="*{stockQuantity}" min="0" />
            <div class="field-error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" th:field="*{category}" placeholder="e.g. Groceries, Electronics" />
        </div>
        <div class="form-group">
            <label>Available</label>
            <select th:field="*{available}">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>
        <button type="submit">Save Product</button>
    </form>
    <a class="back" th:href="@{/admin/products}">← Back to Products</a>
</div>
</body>
</html>
