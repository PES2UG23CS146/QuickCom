<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – QuickCommerce</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a202c; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { text-align: center; color: #718096; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        input:focus, select:focus { outline: none; border-color: #4299e1; }
        button { width: 100%; padding: 12px; background: #48bb78; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        button:hover { background: #38a169; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #718096; }
        .footer a { color: #4299e1; text-decoration: none; }
        .field-error { color: #c53030; font-size: 0.8rem; margin-top: 4px; }
    </style>
</head>
<body>
<div class="card">
    <h2>⚡ QuickCommerce</h2>
    <p class="subtitle">Create your account</p>

    <div th:if="${error}" class="alert" th:text="${error}"></div>

    <form method="post" th:action="@{/register}" th:object="${user}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="John Doe" />
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" />
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Min 6 characters" />
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select th:field="*{role}">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
            </select>
        </div>
        <button type="submit">Create Account</button>
    </form>
    <div class="footer">
        Already registered? <a th:href="@{/login}">Sign in</a>
    </div>
</div>
</body>
</html>
