<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Feedback</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 24px; color: #1a202c; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #ed8936; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #dd6b20; }
    </style>
</head>
<body>
<div class="card">
    <h2>⭐ Leave Feedback</h2>
    <p style="color:#718096; margin-bottom:20px;">Order #<span th:text="${order.id}"></span></p>
    <form method="post" th:action="@{/user/feedback/{id}(id=${order.id})}">
        <div class="form-group">
            <label>Rating</label>
            <select name="rating">
                <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                <option value="4">⭐⭐⭐⭐ Good</option>
                <option value="3">⭐⭐⭐ Average</option>
                <option value="2">⭐⭐ Poor</option>
                <option value="1">⭐ Terrible</option>
            </select>
        </div>
        <div class="form-group">
            <label>Comment</label>
            <textarea name="comment" placeholder="Share your experience..."></textarea>
        </div>
        <button type="submit">Submit Feedback</button>
    </form>
</div>
</body>
</html>
